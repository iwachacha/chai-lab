name: Docs

on:
  pull_request:
    paths:
      - "**/*.md"
      - "package.json"
      - "scripts/check-operational-docs.mjs"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "package.json"
      - "scripts/check-operational-docs.mjs"
      - ".github/workflows/docs.yml"

jobs:
  operational-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check:docs
